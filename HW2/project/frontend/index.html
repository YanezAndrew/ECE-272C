<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Q&A Agent</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    header span { font-size: 0.8rem; color: #6b7280; }

    #dataset-bar {
      padding: 10px 24px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #9ca3af;
    }
    #dataset-bar select {
      background: #2a2d3a;
      color: #e0e0e0;
      border: 1px solid #3a3d4a;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #new-chat-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid #3a3d4a;
      color: #9ca3af;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #new-chat-btn:hover { border-color: #6366f1; color: #a5b4fc; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg { display: flex; gap: 12px; max-width: 820px; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
    }
    .msg.user .avatar    { background: #6366f1; color: #fff; }
    .msg.assistant .avatar { background: #2a2d3a; color: #9ca3af; }

    .bubble {
      background: #1e2130;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: 720px;
    }
    .msg.user .bubble {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }

    .bubble .answer { margin-bottom: 0; }

    .chart-wrapper {
      margin-top: 14px;
      border-top: 1px solid #2a2d3a;
      padding-top: 14px;
    }
    .chart-wrapper .chart-label {
      font-size: 0.75rem;
      color: #6b7280;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .progress {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.82rem; color: #6b7280;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #3a3d4a;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-bubble {
      background: #2d1b1b;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
    }

    .meta {
      font-size: 0.75rem;
      color: #4b5563;
      margin-top: 8px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-right: 6px;
    }
    .badge.pass { background: #14532d; color: #86efac; }
    .badge.fail { background: #7f1d1d; color: #fca5a5; }

    #input-area {
      padding: 16px 24px;
      background: #1a1d27;
      border-top: 1px solid #2a2d3a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #question-input {
      flex: 1;
      background: #2a2d3a;
      border: 1px solid #3a3d4a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 0.9rem;
      padding: 12px 16px;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      outline: none;
    }
    #question-input:focus { border-color: #6366f1; }
    #question-input::placeholder { color: #4b5563; }

    #send-btn {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #send-btn:hover:not(:disabled) { background: #4f46e5; }
    #send-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #4b5563;
    }
    .empty-state h2 { font-size: 1.3rem; color: #6b7280; font-weight: 500; }
    .empty-state p  { font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <h1>CSV Q&amp;A Agent</h1>
  <span>Powered by GPT-4o + LangGraph</span>
</header>

<div id="dataset-bar">
  <label for="dataset-select">Dataset:</label>
  <select id="dataset-select">
    <option value="housing.csv">Housing (California)</option>
    <option value="custom_dataset.csv">Video Game Sales</option>
  </select>
  <button id="new-chat-btn">+ New Chat</button>
</div>

<div id="messages">
  <div class="empty-state">
    <h2>Ask a question about your dataset</h2>
    <p>Select a dataset above, then type your question below.</p>
  </div>
</div>

<div id="input-area">
  <textarea id="question-input" placeholder="Ask a question about the data..." rows="1"></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
  let conversationId = null;
  let isLoading = false;

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("question-input");
  const sendBtn    = document.getElementById("send-btn");
  const datasetSel = document.getElementById("dataset-select");
  const newChatBtn = document.getElementById("new-chat-btn");

  // --- Auto-resize textarea ---
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });

  // --- Send on Enter (Shift+Enter for newline) ---
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener("click", send);
  newChatBtn.addEventListener("click", resetChat);

  function resetChat() {
    conversationId = null;
    messagesEl.innerHTML = `
      <div class="empty-state">
        <h2>Ask a question about your dataset</h2>
        <p>Select a dataset above, then type your question below.</p>
      </div>`;
  }

  function setLoading(val) {
    isLoading = val;
    sendBtn.disabled = val;
    inputEl.disabled = val;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendUserBubble(text) {
    const empty = messagesEl.querySelector(".empty-state");
    if (empty) empty.remove();

    const msg = document.createElement("div");
    msg.className = "msg user";
    msg.innerHTML = `
      <div class="avatar">You</div>
      <div class="bubble">${escapeHtml(text)}</div>`;
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function appendAssistantBubble() {
    const msg = document.createElement("div");
    msg.className = "msg assistant";
    msg.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble">
        <div class="progress">
          <div class="spinner"></div>
          <span class="progress-text">Starting…</span>
        </div>
      </div>`;
    messagesEl.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  function finalizeAssistantBubble(msgEl, data) {
    const bubble = msgEl.querySelector(".bubble");
    let html = `<div class="answer">${escapeHtml(data.final_answer)}</div>`;

    if (data.visualization?.enabled && data.visualization?.figure_json) {
      const chartId = "chart-" + Date.now();
      html += `
        <div class="chart-wrapper">
          <div class="chart-label">${data.visualization.chart_type} chart</div>
          <div id="${chartId}"></div>
        </div>`;
    }

    bubble.innerHTML = html;

    if (data.visualization?.enabled && data.visualization?.figure_json) {
      const chartId = bubble.querySelector("[id^='chart-']").id;
      const fig = JSON.parse(data.visualization.figure_json);
      fig.layout = fig.layout || {};
      fig.layout.paper_bgcolor = "transparent";
      fig.layout.plot_bgcolor  = "transparent";
      fig.layout.font          = { color: "#e0e0e0" };
      fig.layout.margin        = { t: 40, r: 20, b: 60, l: 60 };
      Plotly.newPlot(chartId, fig.data, fig.layout, { responsive: true, displayModeBar: false });
    }

    scrollToBottom();
  }

  function showErrorBubble(message) {
    const msg = document.createElement("div");
    msg.className = "msg assistant";
    msg.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble error-bubble">Error: ${escapeHtml(message)}</div>`;
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  async function send() {
    const question = inputEl.value.trim();
    if (!question || isLoading) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    setLoading(true);

    appendUserBubble(question);
    const assistantMsg = appendAssistantBubble();

    try {
      const response = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          dataset: datasetSel.value,
          conversation_id: conversationId,
        }),
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.detail || "Request failed");
      }

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const event = JSON.parse(line.slice(6));

          if (event.type === "node_done") {
            const label = nodeLabel(event.node);
            assistantMsg.querySelector(".progress-text").textContent = label;
          } else if (event.type === "result") {
            conversationId = event.conversation_id;
            finalizeAssistantBubble(assistantMsg, event);
          } else if (event.type === "error") {
            assistantMsg.remove();
            showErrorBubble(event.message);
          }
        }
      }
    } catch (err) {
      assistantMsg.remove();
      showErrorBubble(err.message);
    } finally {
      setLoading(false);
    }
  }

  function nodeLabel(node) {
    const labels = {
      codegen:       "Generating code…",
      execute:       "Executing code…",
      evaluate:      "Evaluating result…",
      retry_codegen: "Retrying code generation…",
      respond:       "Writing answer…",
      visualize:     "Building visualization…",
    };
    return labels[node] || node + "…";
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\n/g, "<br>");
  }
</script>
</body>
</html>
